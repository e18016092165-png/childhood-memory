<style>
:root{--bg:#FFF8F0;--card:#FFF3E8;--pri:#D4885C;--red:#C4383A;--bn:#5D3A1A;--tx:#3C2415;--gold:#C8963E}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse at 20% 10%,rgba(212,136,92,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(196,56,58,.05) 0%,transparent 50%)}
.app{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .5s;padding:20px 24px 40px;overflow-y:auto;opacity:0;pointer-events:none;transform:translateY(30px)}
.screen.active{opacity:1;pointer-events:auto;transform:translateY(0);position:relative}
.top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--pri);font-size:15px;font-weight:600;cursor:pointer;padding:8px;border:none;background:none;font-family:inherit}
.back-btn:active{opacity:.6}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:1px;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
.btn:active{transform:scale(.95)}
.btn-pri{background:linear-gradient(135deg,#D4885C,#C4383A);color:#fff;box-shadow:0 6px 20px rgba(196,56,58,.3)}
.btn-outline{background:transparent;border:2px solid var(--pri);color:var(--pri)}
.btn-sm{padding:10px 24px;font-size:14px}
.btn-block{width:100%}
.btn-gold{background:linear-gradient(135deg,#E8B84B,#C8963E);color:#fff;box-shadow:0 6px 20px rgba(200,150,62,.4)}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mt-32{margin-top:32px}.mt-40{margin-top:40px}

/* Splash */
.splash-logo{margin-top:50px;font-size:72px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.splash-title{font-size:32px;font-weight:900;color:var(--bn);margin-top:16px;text-shadow:2px 2px 0 rgba(212,136,92,.3);letter-spacing:2px}
.splash-sub{color:var(--pri);font-size:15px;margin-top:8px;opacity:.8}
.splash-decor{margin-top:30px;display:flex;gap:12px;font-size:32px}
.splash-decor span{animation:float 3s infinite}
.splash-decor span:nth-child(2){animation-delay:.5s}
.splash-decor span:nth-child(3){animation-delay:1s}
.splash-decor span:nth-child(4){animation-delay:1.5s}
.splash-decor span:nth-child(5){animation-delay:.3s}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.section-title{font-size:22px;font-weight:800;color:var(--bn);text-align:center}
.section-desc{font-size:14px;color:var(--pri);text-align:center;margin-top:6px;opacity:.8}

/* Upload */
.upload-zone{width:100%;max-width:300px;aspect-ratio:1;border:3px dashed var(--pri);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.upload-zone:active{background:#FDE8D6;border-color:var(--red)}
.upload-zone.has-photo{border-style:solid;border-color:var(--pri)}
.upload-icon{font-size:52px;margin-bottom:12px;opacity:.7}
.upload-text{font-size:15px;color:var(--pri);font-weight:600}
.upload-hint{font-size:12px;color:#999;margin-top:6px}
.upload-preview{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;display:none}
.upload-preview.show{display:block}
#uploadFile{display:none}

/* Result */
.result-photo{width:280px;height:280px;border-radius:24px;overflow:hidden;border:4px solid #fff;box-shadow:0 8px 40px rgba(60,36,21,.15);position:relative;background:#f0e0d0}
.result-photo canvas{width:100%;height:100%;object-fit:cover}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.filter-chip{padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;background:var(--card);color:var(--bn);border:2px solid transparent;cursor:pointer;transition:all .25s;white-space:nowrap}
.filter-chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.filter-chip:active{transform:scale(.95)}
.loading-dots{display:flex;gap:6px;justify-content:center;margin:24px 0}
.loading-dots span{width:10px;height:10px;border-radius:50%;background:var(--pri);animation:dotBounce 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 6px 20px rgba(102,126,234,.4);position:relative;overflow:hidden}
.ai-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(45deg,#f093fb22,#f5576c22,#4facfe22);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sparkle{animation:sparkle 1.5s infinite}
@keyframes sparkle{0%,100%{opacity:1}50%{opacity:.3}}

/* Petals */
.petals{position:fixed;inset:0;pointer-events:none;z-index:0}
.petal{position:absolute;top:-40px;animation:petalFall linear infinite}
@keyframes petalFall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:.7}50%{transform:translateY(50vh) rotate(180deg) translateX(40px);opacity:.5}100%{transform:translateY(105vh) rotate(360deg) translateX(-20px);opacity:0}}

/* ===== MAP ===== */
.map-wrap{width:100%;max-width:400px;aspect-ratio:4/5;position:relative;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(60,36,21,.1);border:3px solid #E8D5B0}
.map-canvas{position:absolute;inset:0;width:100%;height:100%}
.map-label{position:absolute;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;background:rgba(255,255,255,.9);color:var(--bn);box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:all .3s;white-space:nowrap;z-index:2;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);border:1.5px solid rgba(212,136,92,.3)}
.map-label:active{transform:scale(1.08);background:var(--pri);color:#fff}
.map-label.visited{background:rgba(255,240,200,.95);border-color:var(--gold)}
.map-avatar{position:absolute;width:44px;height:44px;border-radius:50%;border:3px solid var(--red);box-shadow:0 4px 12px rgba(196,56,58,.4);z-index:3;cursor:pointer;transition:all .4s;object-fit:cover;display:none;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
.map-avatar.show{display:block}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}

/* Stickers */
.sticker-bar{display:flex;gap:6px;margin-top:16px;padding:10px;background:var(--card);border-radius:16px;flex-wrap:wrap;justify-content:center;box-shadow:inset 0 2px 8px rgba(0,0,0,.05)}
.sticker-slot{width:40px;height:40px;border-radius:10px;border:2px dashed #DDD;display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff;transition:all .3s}
.sticker-slot.collected{border-style:solid;border-color:var(--gold);background:#FFF8E8;animation:popIn .4s ease}

/* ===== IMMERSIVE SCENE (overlay) ===== */
.scene-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.scene-overlay.show{opacity:1;pointer-events:auto}
.scene-card{width:92%;max-width:420px;max-height:85vh;background:#FFFDF7;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.32,.72,0,1)}
.scene-overlay.show .scene-card{transform:scale(1) translateY(0)}
.scene-bg{position:relative;height:220px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.scene-body{padding:20px;overflow-y:auto;flex:1}
.scene-stamp{width:70px;height:70px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;transform:rotate(-15deg);box-shadow:0 4px 16px rgba(196,56,58,.4);animation:stampIn .5s cubic-bezier(.175,.885,.32,1.275);display:none}
.scene-stamp.show{display:flex}
@keyframes stampIn{0%{transform:scale(3) rotate(-50deg);opacity:0}100%{transform:scale(1) rotate(-15deg);opacity:1}}
.scene-emoji{font-size:64px;text-align:center;line-height:1;position:relative;z-index:2}
.scene-title{font-size:22px;font-weight:900;color:var(--bn);text-align:center;margin-top:8px}
.scene-desc{font-size:14px;color:#6B4226;text-align:center;line-height:1.8;margin-top:12px}
.scene-interact{margin-top:16px;position:relative;min-height:60px}

/* Scene-specific backgrounds */
.bg-school{background:linear-gradient(180deg,#C8D8C0 0%,#D8E0D0 40%,#E8D5B0 60%,#D4C4A0 100%)}
.bg-shop{background:linear-gradient(180deg,#F5E6D0 0%,#EDD8B8 50%,#E0C8A0 100%)}
.bg-play{background:linear-gradient(180deg,#A8D8EA 0%,#C8E8F0 40%,#B8D898 60%,#A0C880 100%)}
.bg-park{background:linear-gradient(180deg,#B8D8C0 0%,#C8E0C8 30%,#A0C090 60%,#8AB878 100%)}
.bg-grandma{background:linear-gradient(180deg,#F8E8D8 0%,#F0D8C0 50%,#E8C8A8 100%)}
.bg-arcade{background:linear-gradient(180deg,#2A1A3A 0%,#3A2A5A 50%,#1A0A2A 100%)}
.bg-stream{background:linear-gradient(180deg,#A8D8F0 0%,#C0E8F8 30%,#80C8A0 60%,#60A080 100%)}

/* Interactive elements in scenes */
.chalkboard{position:relative;width:160px;height:100px;background:#3A5A40;border:6px solid #8B6914;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.chalkboard::after{content:'点击擦黑板';color:rgba(255,255,255,.6);font-size:14px}
.chalkboard.erased{background:#4A6A50}
.chalkboard.erased::after{content:'🌻 好好学习 天天向上';color:rgba(255,255,200,.9);font-size:11px}

.shop-shelf{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px}
.shop-item{width:55px;height:65px;background:#fff;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .3s;font-size:28px}
.shop-item:active{transform:scale(1.1);box-shadow:0 4px 16px rgba(212,136,92,.3)}
.shop-item .tag{font-size:10px;color:var(--pri);margin-top:2px;font-weight:600}
.shop-item.picked{background:#FFF3CD;border:2px solid var(--gold);animation:popIn .3s ease}

.arcade-game{width:100%;max-width:300px;height:180px;background:#1a1a2e;border-radius:12px;position:relative;overflow:hidden;border:3px solid #333;margin:0 auto}
.arcade-hole{position:absolute;width:55px;height:55px;border-radius:50%;background:radial-gradient(circle,#000 40%,#1a1a2e 70%);cursor:pointer;transition:transform .1s}
.arcade-hole:active{transform:scale(.85)}
.arcade-score{color:#FFD700;font-size:20px;font-weight:900;text-align:center;padding:8px;font-family:monospace}
.arcade-mole{position:absolute;width:50px;height:50px;border-radius:50%;background:#C8963E;display:flex;align-items:center;justify-content:center;font-size:24px;transition:bottom .15s;pointer-events:none}

.stream-scene{position:relative;width:100%;height:120px;margin:0 auto}
.stream-stone{position:absolute;width:30px;height:20px;background:#999;border-radius:50%;cursor:grab;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:transform .1s}
.stream-stone:active{cursor:grabbing;transform:scale(.9)}
.stream-ripple{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.6);animation:ripple 1s ease-out forwards;pointer-events:none}
@keyframes ripple{0%{width:10px;height:5px;opacity:1}100%{width:80px;height:40px;opacity:0}}

.play-swing{position:relative;width:120px;height:140px;cursor:pointer;margin:0 auto}
.play-swing-rope{position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100px;background:#8B6914}
.play-swing-seat{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:50px;height:14px;background:#C8963E;border-radius:3px;transition:transform .6s cubic-bezier(.45,0,.55,1)}
.play-swing.swinging .play-swing-seat{animation:swing 2s ease-in-out infinite}
@keyframes swing{0%,100%{transform:translateX(-50%) rotate(-15deg)}50%{transform:translateX(-50%) rotate(15deg)}}

/* Confetti */
.confetti{position:fixed;pointer-events:none;z-index:1000;inset:0}
.confetti-piece{position:absolute;animation:confettiFall 3s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}}

/* Share */
.share-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 24px rgba(60,36,21,.1);text-align:center;width:100%;max-width:360px;margin-top:24px;display:none}
.share-card.show{display:block}
.share-stats{display:flex;gap:20px;justify-content:center;margin-top:16px}
.share-stat{text-align:center}
.share-stat-num{font-size:28px;font-weight:900;color:var(--red)}
.share-stat-label{font-size:12px;color:#999}

@media(max-width:360px){.splash-title{font-size:26px}.btn{padding:12px 28px;font-size:15px}.section-title{font-size:19px}}
</style>
</head>
<body>
<div class="petals" id="petals"></div>
<div class="app" id="app">

<!-- SPLASH -->
<div class="screen active" id="screen-splash">
<div class="splash-logo">🧒</div>
<div class="splash-title">回到童年</div>
<div class="splash-sub">一张照片 · 一段回忆 · 一趟旅行</div>
<div class="splash-decor"><span>🍭</span><span>🎈</span><span>🎠</span><span>📚</span><span>🪁</span></div>
<button class="btn btn-pri mt-40" onclick="goTo('upload')">开始时光旅行 ✨</button>
<div style="margin-top:32px;font-size:12px;color:#CCC">六一特别企划 · 2026</div>
</div>

<!-- UPLOAD -->
<div class="screen" id="screen-upload">
<div class="top-bar"><button class="back-btn" onclick="goTo('splash')">← 返回</button><span style="font-size:13px;color:#999">Step 1/3</span></div>
<div class="section-title">📷 上传一张照片</div>
<div class="section-desc">选一张正脸近照，帮你找回童年的样子</div>
<div class="upload-zone mt-24" id="uploadZone" onclick="document.getElementById('uploadFile').click()">
<span class="upload-icon">📸</span>
<span class="upload-text">点击或拖拽上传照片</span>
<span class="upload-hint">正脸近照效果最佳 ✨</span>
<img class="upload-preview" id="uploadPreview" alt="">
</div>
<input type="file" id="uploadFile" accept="image/*" onchange="handleUpload(this)">
<button class="btn btn-pri btn-block mt-24" id="btnNext" disabled onclick="processPhoto()">下一步 → 生成童年照</button>
<div style="margin-top:12px;font-size:12px;color:#999;text-align:center">照片仅在你的设备上处理，不上传服务器</div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
<div class="top-bar"><button class="back-btn" onclick="goTo('upload')">← 返回</button><span style="font-size:13px;color:#999">Step 2/3</span></div>
<div class="section-title">✨ 你的童年记忆</div>
<div class="section-desc" id="filterDesc">试试不同滤镜，或点击AI魔法生成真正的童年照</div>
<div class="result-photo mt-24"><canvas id="resultCanvas"></canvas></div>
<div class="filter-row">
<span class="filter-chip active" onclick="applyFilter('baby',this)">👶 婴儿脸</span>
<span class="filter-chip" onclick="applyFilter('vintage',this)">📜 泛黄旧照</span>
<span class="filter-chip" onclick="applyFilter('dream',this)">💭 梦境童年</span>
<span class="filter-chip" onclick="applyFilter('sketch',this)">✏️ 彩铅手绘</span>
</div>
<button class="btn ai-btn btn-block mt-16" id="btnAI" onclick="requestAI()">
<span class="sparkle">✨</span> AI 魔法——真正生成你的童年照 <span class="sparkle">✨</span>
</button>
<div id="aiStatus" style="margin-top:8px;font-size:13px;color:var(--pri);text-align:center;display:none"></div>
<button class="btn btn-pri btn-block mt-16" onclick="goTo('map')">进入时光地图 🗺️</button>
</div>

<!-- MAP -->
<div class="screen" id="screen-map">
<div class="top-bar"><button class="back-btn" onclick="goTo('result')">← 返回</button><span style="font-size:13px;color:#999">Step 3/3</span></div>
<div class="section-title">🗺️ 童年小镇</div>
<div class="section-desc">点击地点，进入沉浸式童年回忆</div>
<div class="map-wrap mt-16" id="mapWrap">
<canvas class="map-canvas" id="mapCanvas"></canvas>
</div>
<div class="sticker-bar" id="stickerBar">
<div class="sticker-slot" data-loc="school">🏫</div>
<div class="sticker-slot" data-loc="shop">🏪</div>
<div class="sticker-slot" data-loc="playground">🎠</div>
<div class="sticker-slot" data-loc="park">🌳</div>
<div class="sticker-slot" data-loc="grandma">🏠</div>
<div class="sticker-slot" data-loc="arcade">🕹️</div>
<div class="sticker-slot" data-loc="stream">🌊</div>
</div>
<div style="text-align:center;font-size:12px;color:#999;margin-top:4px">已收集: <span id="stickerCount">0</span>/7</div>
<div class="share-card" id="shareCard">
<div style="font-size:40px">🎉</div>
<div style="font-size:20px;font-weight:900;color:var(--red);margin-top:8px">全部收集完毕！</div>
<div style="font-size:14px;color:var(--bn);margin-top:4px">你已经走遍了童年的每一个角落</div>
<div class="share-stats"><div class="share-stat"><div class="share-stat-num">7</div><div class="share-stat-label">地点</div></div>
<div class="share-stat"><div class="share-stat-num" id="totalMinutes">0</div><div class="share-stat-label">分钟回忆</div></div>
<div class="share-stat"><div class="share-stat-num">1</div><div class="share-stat-label">张童年照</div></div></div>
<button class="btn btn-pri btn-block mt-16" onclick="shareResult()">📤 分享给朋友</button>
</div>
</div>

<!-- IMMERSIVE SCENE OVERLAY -->
<div class="scene-overlay" id="sceneOverlay" onclick="if(event.target===this)closeScene()">
<div class="scene-card" id="sceneCard">
<div class="scene-bg" id="sceneBg"></div>
<div class="scene-body">
<div class="scene-stamp" id="sceneStamp"></div>
<div class="scene-emoji" id="sceneEmoji"></div>
<div class="scene-title" id="sceneTitle"></div>
<div class="scene-desc" id="sceneDesc"></div>
<div class="scene-interact" id="sceneInteract"></div>
<button class="btn btn-gold btn-block mt-16" id="sceneCollectBtn" onclick="collectAndClose()">💝 收藏这份回忆</button>
</div>
</div>
</div>

</div>

<script>
// ===== STATE =====
let uploadedImage = null, currentFilter = 'baby', visitedLocations = new Set(), startTime = Date.now();
const AI_BACKEND = '';

// ===== LOCATION DATA =====
const locations = {
school:{emoji:'🏫',name:'红星小学',bg:'bg-school',
desc:'叮铃铃的下课铃响了。你坐在靠窗的位置，阳光透过梧桐叶洒在课本上。黑板上是还没擦掉的粉笔字——「我的梦想」。那个总揪你辫子的同桌，偷偷在你铅笔盒里放了颗大白兔奶糖。'},
shop:{emoji:'🏪',name:'阿婆小卖部',bg:'bg-shop',
desc:'推开玻璃门，叮当一声响。五毛钱的辣条、一毛钱的果丹皮、两毛钱的冰袋。你攥着攒了三天的五毛钱，在琳琅满目的零食前纠结了很久很久。'},
playground:{emoji:'🎠',name:'街心游乐场',bg:'bg-play',
desc:'秋千荡得比天还高，风吹过耳边的时候，你觉得自己在飞。滑梯永远排着长队，跷跷板那头坐着的，是放学后第一个冲出校门的小伙伴。'},
park:{emoji:'🌳',name:'人民公园',bg:'bg-park',
desc:'春天放风筝、夏天捉知了、秋天捡银杏叶夹在书里、冬天打雪仗堆雪人。公园里那条走了无数遍的小路，每一块石板你都认得。'},
grandma:{emoji:'🏠',name:'外婆家小院',bg:'bg-grandma',
desc:'推开吱呀的木门，院里晾着刚洗的棉被，阳光的味道暖烘烘的。厨房飘来红烧肉的香味，外婆探出头笑着说"乖孙回来啦"，手在围裙上擦了擦。'},
arcade:{emoji:'🕹️',name:'街机游戏厅',bg:'bg-arcade',
desc:'投币的脆响、拳皇的KO、合金弹头的突突声。攒了一周的早餐钱，猫着腰溜进去。老板睁一只眼闭一只眼——"别告诉你妈啊"。'},
stream:{emoji:'🌊',name:'小河边',bg:'bg-stream',
desc:'夏天卷起裤腿踩进清凉的河水，小石子硌着脚底板痒痒的。用扁石头打水漂——一个、两个、三个……直到夕阳把水面染成金色。'}
};

// ===== INIT =====
function init(){createPetals();setupDragDrop();document.getElementById('resultCanvas').width=560;document.getElementById('resultCanvas').height=560}
function createPetals(){const c=document.getElementById('petals'),t=['🌸','🍂','🍃','💮','🌺'];for(let i=0;i<20;i++){const p=document.createElement('span');p.className='petal';p.textContent=t[i%t.length];p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*15+'s';p.style.fontSize=(10+Math.random()*16)+'px';c.appendChild(p)}}

// ===== NAVIGATION =====
function goTo(name){document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.position='absolute'});const t=document.getElementById('screen-'+name);t.classList.add('active');t.style.position='relative';if(name==='map')setTimeout(()=>{const w=document.getElementById('mapWrap');w.querySelectorAll('.map-label').forEach(l=>l.remove());drawMap();updateMapAvatar()},100);setTimeout(()=>t.scrollTop=0,50)}

// ===== UPLOAD =====
function setupDragDrop(){const z=document.getElementById('uploadZone');z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover')});z.addEventListener('dragleave',()=>z.classList.remove('dragover'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadImage(f)})}
function handleUpload(i){const f=i.files[0];if(f)loadImage(f)}
function loadImage(f){const r=new FileReader();r.onload=function(e){uploadedImage=new Image();uploadedImage.onload=function(){document.getElementById('uploadPreview').src=e.target.result;document.getElementById('uploadPreview').classList.add('show');document.getElementById('uploadZone').classList.add('has-photo');document.getElementById('btnNext').disabled=false};uploadedImage.src=e.target.result};r.readAsDataURL(f)}

// ===== PHOTO PROCESSING =====
function processPhoto(){if(!uploadedImage)return;goTo('result');setTimeout(()=>applyFilter('baby',document.querySelector('.filter-chip.active')),300)}

function applyFilter(filter,el){
currentFilter=filter;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));if(el)el.classList.add('active');
const c=document.getElementById('resultCanvas'),ctx=c.getContext('2d'),s=560;c.width=s;c.height=s;
const img=uploadedImage,src=Math.min(img.width,img.height),sx=(img.width-src)/2,sy=(img.height-src)/2;
ctx.clearRect(0,0,s,s);
ctx.save();roundedClip(ctx,s);ctx.drawImage(img,sx,sy,src,src,0,0,s,s);

const d=ctx.getImageData(0,0,s,s),p=d.data;
switch(filter){
case'baby':
// Baby face filter: smooth skin, brighten, warm tone, slight blur simulation
for(let i=0;i<p.length;i+=4){
const r=p[i],g=p[i+1],b=p[i+2];
// Skin smoothing via neighbor averaging (simplified - just soften)
const avg=(r+g+b)/3;
p[i]=Math.min(255,r*.7+avg*.3+18);
p[i+1]=Math.min(255,g*.7+avg*.3+12);
p[i+2]=Math.min(255,b*.7+avg*.3+6);
// Brighten
p[i]=Math.min(255,p[i]+10);
p[i+1]=Math.min(255,p[i+1]+8);
p[i+2]=Math.min(255,p[i+2]+5);
}
// Add warm rosy cheeks effect (center area)
const cx=s/2,cy=s/2,r2=s*.25;
for(let y=Math.floor(cy-r2);y<cy+r2;y++){
for(let x=Math.floor(cx-r2);x<cx+r2;x++){
const dx=x-cx,dy=y-cy,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<r2){const idx=(y*s+x)*4;const t2=1-(dist/r2);p[idx]=Math.min(255,p[idx]+15*t2);p[idx+1]=Math.min(255,p[idx+1]-5*t2)}
}
}
break;
case'vintage':for(let i=0;i<p.length;i+=4){const r=p[i],g=p[i+1],b=p[i+2];p[i]=Math.min(255,r*.393+g*.769+b*.189);p[i+1]=Math.min(255,r*.349+g*.686+b*.168);p[i+2]=Math.min(255,r*.272+g*.534+b*.131)}break;
case'dream':for(let i=0;i<p.length;i+=4){p[i]=Math.min(255,p[i]*1.05+15);p[i+1]=Math.min(255,p[i+1]*1.02+12);p[i+2]=Math.min(255,p[i+2]*1.0+18)}break;
case'sketch':for(let i=0;i<p.length;i+=4){p[i]=Math.round(p[i]/48)*48+10;p[i+1]=Math.round(p[i+1]/48)*48+5;p[i+2]=Math.round(p[i+2]/48)*48}break;
}
ctx.putImageData(d,0,0);
ctx.restore();
// Frame + vignette
ctx.beginPath();ctx.arc(s/2,s/2,s/2-4,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3;ctx.stroke();
const g=ctx.createRadialGradient(s/2,s/2,s*.35,s/2,s/2,s/2);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.2)');
ctx.beginPath();ctx.arc(s/2,s/2,s/2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
ctx.font='bold 13px -apple-system,"PingFang SC",sans-serif';ctx.fillStyle='rgba(255,255,255,.9)';ctx.textAlign='right';ctx.fillText('童 年 记 忆',s-24,s-20);
updateMapAvatar();
}
function roundedClip(ctx,s){ctx.beginPath();ctx.arc(s/2,s/2,s/2-4,0,Math.PI*2);ctx.clip()}
function updateMapAvatar(){const c=document.getElementById('resultCanvas'),a=document.getElementById('map-avatar');if(c&&a){a.src=c.toDataURL('image/jpeg',.7);a.classList.add('show')}}

// ===== AI MAGIC =====
async function requestAI(){
const st=document.getElementById('aiStatus'),btn=document.getElementById('btnAI');
st.style.display='block';st.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>正在上传照片…';
btn.disabled=true;btn.style.opacity='.6';
try{
const c=document.getElementById('resultCanvas'),imgData=c.toDataURL('image/jpeg',.8),taskId='task_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
const res=await fetch(AI_BACKEND+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:imgData,taskId})});
const d=await res.json();
if(!d.success)throw new Error(d.error);
st.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>AI正在为你生成童年照…大约需要30秒';
// Poll for result
for(let i=0;i<60;i++){
await new Promise(r=>setTimeout(r,2000));
const sr=await fetch(AI_BACKEND+'/api/status/'+taskId);
const sd=await sr.json();
if(sd.status==='completed'&&sd.resultImage){
const ni=new Image();ni.onload=function(){uploadedImage=ni;applyFilter('baby',document.querySelector('.filter-chip.active'));st.innerHTML='✅ AI童年照生成成功！看看效果吧～';btn.disabled=false;btn.style.opacity='1';spawnConfetti()};ni.src=sd.resultImage;return}
st.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>AI处理中…（'+(i*2+2)+'秒）';
}
throw new Error('超时，请重试');
}catch(e){
st.innerHTML='💡 AI服务暂时繁忙，已为你应用精美婴儿脸滤镜～<br>先探索地图吧，稍后再试！';btn.disabled=false;btn.style.opacity='1'}
}

// ===== MAP =====
function drawMap(){
const c=document.getElementById('mapCanvas'),w=document.getElementById('mapWrap'),r=w.getBoundingClientRect(),W=r.width||400,H=W*1.25;
c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';
const ctx=c.getContext('2d');ctx.scale(2,2);
// Sky+Ground
const sg=ctx.createLinearGradient(0,0,0,H*.4);sg.addColorStop(0,'#FAF0DC');sg.addColorStop(1,'#F6E3C5');ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*.4);
const gg=ctx.createLinearGradient(0,H*.4,0,H);gg.addColorStop(0,'#E8D5B0');gg.addColorStop(.5,'#DCC8A0');gg.addColorStop(1,'#C8B590');ctx.fillStyle=gg;ctx.fillRect(0,H*.4,W,H*.6);
// Roads
ctx.strokeStyle='#D4B896';ctx.lineWidth=14;ctx.lineCap='round';ctx.lineJoin='round';
ctx.beginPath();ctx.moveTo(W*.1,H*.75);ctx.quadraticCurveTo(W*.25,H*.55,W*.45,H*.5);ctx.quadraticCurveTo(W*.65,H*.45,W*.9,H*.35);ctx.stroke();
ctx.beginPath();ctx.moveTo(W*.45,H*.5);ctx.quadraticCurveTo(W*.35,H*.3,W*.2,H*.25);ctx.stroke();
ctx.beginPath();ctx.moveTo(W*.45,H*.5);ctx.quadraticCurveTo(W*.5,H*.65,W*.7,H*.7);ctx.stroke();
ctx.strokeStyle='#E8D5B0';ctx.lineWidth=2;ctx.setLineDash([6,10]);
ctx.beginPath();ctx.moveTo(W*.1,H*.75);ctx.quadraticCurveTo(W*.25,H*.55,W*.45,H*.5);ctx.quadraticCurveTo(W*.65,H*.45,W*.9,H*.35);ctx.stroke();ctx.setLineDash([]);
// Buildings
drawB(ctx,W*.1,H*.12,55,45,'#E8C9A0','🏫');drawB(ctx,W*.62,H*.22,45,38,'#F0D5B0','🏪');drawB(ctx,W*.25,H*.55,50,40,'#EAD5B8','🎠');
drawT(ctx,W*.55,H*.62);drawT(ctx,W*.18,H*.42);drawT(ctx,W*.72,H*.5);
drawB(ctx,W*.07,H*.62,48,42,'#EDD8C0','🌳');drawB(ctx,W*.38,H*.18,50,44,'#F2DDC5','🏠');drawB(ctx,W*.7,H*.6,40,36,'#E5CEB0','🕹️');drawB(ctx,W*.48,H*.78,45,38,'#D9C5A8','🌊');
// River
ctx.strokeStyle='#A8C8E0';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(W*.3,H*.95);ctx.quadraticCurveTo(W*.4,H*.85,W*.55,H*.88);ctx.quadraticCurveTo(W*.7,H*.9,W*.85,H*.85);ctx.stroke();
// Sun+Clouds
ctx.fillStyle='#F5D76E';ctx.beginPath();ctx.arc(W*.82,H*.08,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#F9E88A';ctx.beginPath();ctx.arc(W*.82,H*.08,18,0,Math.PI*2);ctx.fill();
drawC(ctx,W*.3,H*.08);drawC(ctx,W*.55,H*.04);
// Labels
placeLabels(W,H);
// Avatar
let av=document.getElementById('map-avatar');
if(!av){av=document.createElement('img');av.id='map-avatar';av.className='map-avatar';av.addEventListener('click',()=>{const cc=document.getElementById('resultCanvas');if(cc){const l=document.createElement('a');l.download='childhood-photo.jpg';l.href=cc.toDataURL('image/jpeg',.9);l.click()}});w.appendChild(av)}
av.style.left='43%';av.style.top='48%';
}
function drawB(ctx,x,y,w,h,c,emoji){ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(x+2,y+2,w,h);ctx.fillStyle=c;ctx.fillRect(x,y,w,h);ctx.strokeStyle='#C4A882';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);ctx.fillStyle='#C4383A';ctx.beginPath();ctx.moveTo(x-3,y);ctx.lineTo(x+w/2,y-16);ctx.lineTo(x+w+3,y);ctx.closePath();ctx.fill();ctx.strokeStyle='#A02E30';ctx.stroke();ctx.fillStyle='#8B6914';ctx.fillRect(x+w/2-7,y+h-16,14,16);ctx.fillStyle='#B8D8F0';ctx.fillRect(x+w-16,y+8,10,10);ctx.strokeStyle='#8B6914';ctx.lineWidth=1;ctx.strokeRect(x+w-16,y+8,10,10);ctx.beginPath();ctx.moveTo(x+w-16,y+13);ctx.lineTo(x+w-6,y+13);ctx.moveTo(x+w-11,y+8);ctx.lineTo(x+w-11,y+18);ctx.stroke()}
function drawT(ctx,x,y){ctx.fillStyle='#8B6914';ctx.fillRect(x-3,y-5,6,16);ctx.fillStyle='#7BA05B';ctx.beginPath();ctx.arc(x,y-6,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8DB86A';ctx.beginPath();ctx.arc(x-3,y-9,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+4,y-8,9,0,Math.PI*2);ctx.fill()}
function drawC(ctx,x,y){ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(x,y,16,0,Math.PI*2);ctx.arc(x+18,y-4,14,0,Math.PI*2);ctx.arc(x+32,y,16,0,Math.PI*2);ctx.arc(x+12,y+4,12,0,Math.PI*2);ctx.fill()}
function placeLabels(W,H){
const w=document.getElementById('mapWrap'),pos={school:{l:'10%',t:'14%'},grandma:{l:'36%',t:'14%'},shop:{l:'64%',t:'22%'},playground:{l:'22%',t:'52%'},park:{l:'5%',t:'62%'},arcade:{l:'68%',t:'60%'},stream:{l:'46%',t:'78%'}};
Object.entries(pos).forEach(([k,p])=>{const lb=document.createElement('div');lb.className='map-label'+(visitedLocations.has(k)?' visited':'');lb.textContent=locations[k].emoji+' '+locations[k].name;lb.style.left=p.l;lb.style.top=p.t;lb.addEventListener('click',e=>{e.stopPropagation();openScene(k)});w.appendChild(lb)})
}

// ===== IMMERSIVE SCENES =====
let currentLoc=null;
function openScene(locKey){
currentLoc=locKey;const loc=locations[locKey];
document.getElementById('sceneBg').className='scene-bg '+loc.bg;
document.getElementById('sceneEmoji').textContent=loc.emoji;
document.getElementById('sceneTitle').textContent=loc.name;
document.getElementById('sceneDesc').textContent=loc.desc;
document.getElementById('sceneStamp').className='scene-stamp';
document.getElementById('sceneStamp').textContent='📮';
document.getElementById('sceneCollectBtn').textContent=visitedLocations.has(locKey)?'✅ 已收藏 · 再次回忆':'💝 收藏这份回忆';
document.getElementById('sceneCollectBtn').disabled=false;

// Build interactive elements based on location
const inter=document.getElementById('sceneInteract');
inter.innerHTML='';
switch(locKey){
case'school':buildSchool(inter);break;
case'shop':buildShop(inter);break;
case'playground':buildPlayground(inter);break;
case'arcade':buildArcade(inter);break;
case'stream':buildStream(inter);break;
case'park':buildPark(inter);break;
case'grandma':buildGrandma(inter);break;
}

document.getElementById('sceneOverlay').classList.add('show');
document.body.style.overflow='hidden';
}
function closeScene(){document.getElementById('sceneOverlay').classList.remove('show');document.body.style.overflow='';clearIntervals()}
function collectAndClose(){
if(currentLoc&&!visitedLocations.has(currentLoc)){
visitedLocations.add(currentLoc);
collectSticker(currentLoc);
document.getElementById('sceneStamp').className='scene-stamp show';
document.getElementById('sceneCollectBtn').textContent='✅ 已收藏！';
document.getElementById('sceneCollectBtn').disabled=true;
spawnConfetti();
setTimeout(()=>{closeScene();checkAllCollected()},1200);
}else{closeScene()}
}

// Interactive scenes
let sceneIntervals=[];
function clearIntervals(){sceneIntervals.forEach(clearInterval);sceneIntervals=[]}

function buildSchool(el){
el.innerHTML='<div class="chalkboard" id="chalkboard" onclick="this.classList.toggle(\'erased\')"></div><div style="text-align:center;margin-top:8px;font-size:12px;color:#999">👆 点击黑板擦一擦</div>';
}

function buildShop(el){
const items=[{e:'🍬',n:'大白兔',p:'1毛'},{e:'🍭',n:'棒棒糖',p:'2毛'},{e:'🌶️',n:'辣条',p:'5毛'},{e:'🧃',n:'冰袋',p:'2毛'},{e:'🍫',n:'麦丽素',p:'3毛'},{e:'🍪',n:'动物饼干',p:'1毛'}];
el.innerHTML='<div style="font-size:13px;color:var(--pri);text-align:center;margin-bottom:8px;font-weight:600">🛒 你有5毛零花钱，点击选购：</div><div class="shop-shelf">'+items.map(i=>'<div class="shop-item" onclick="pickCandy(this)" data-name="'+i.n+'"><span>'+i.e+'</span><span class="tag">'+i.p+'</span></div>').join('')+'</div><div id="shopMsg" style="text-align:center;font-size:14px;color:var(--bn);margin-top:8px;font-weight:600"></div>';
}
function pickCandy(el){
if(el.classList.contains('picked'))return;
document.querySelectorAll('.shop-item').forEach(i=>i.classList.remove('picked'));
el.classList.add('picked');
const msgs=['哇！还是小时候的味道！😋','好甜～和记忆里一模一样 🍬','小时候最爱的就是它了！','每次放学都要买一包 🥹'];
document.getElementById('shopMsg').textContent=el.dataset.name+'：'+msgs[Math.floor(Math.random()*msgs.length)];
}

function buildPlayground(el){
el.innerHTML='<div class="play-swing" id="playSwing" onclick="this.classList.toggle(\'swinging\')"><div class="play-swing-rope"></div><div class="play-swing-seat"></div></div><div style="text-align:center;margin-top:8px;font-size:12px;color:#999">👆 点击秋千荡起来</div>';
}

function buildArcade(el){
el.innerHTML='<div class="arcade-game" id="arcadeGame"><div class="arcade-score">🎯 <span id="arcadeScore">0</span> 分</div><div style="color:#fff;text-align:center;font-size:14px;margin-top:8px">快打地鼠！点击冒出来的地鼠 🐹</div></div><div style="text-align:center;margin-top:8px;font-size:12px;color:#999">👆 30秒倒计时，看你能打多少！</div>';
setTimeout(()=>startArcade(),500);
}
function startArcade(){
const g=document.getElementById('arcadeGame'),holes=[],score={v:0};
// Create holes
for(let i=0;i<6;i++){const h=document.createElement('div');h.className='arcade-hole';h.style.left=(10+i*50)+'px';h.style.top='80px';h.onclick=function(){score.v++;document.getElementById('arcadeScore').textContent=score.v;this.style.transform='scale(.7)';setTimeout(()=>this.style.transform='',100)};g.appendChild(h);holes.push(h)}
// Spawn moles
const mole=document.createElement('div');mole.className='arcade-mole';mole.textContent='🐹';g.appendChild(mole);
const spawn=setInterval(()=>{const h=holes[Math.floor(Math.random()*holes.length)];mole.style.left=h.style.left;mole.style.top='60px';mole.style.display='flex';setTimeout(()=>mole.style.display='none',800+Math.random()*400)},1000);
sceneIntervals.push(spawn);
setTimeout(()=>{clearInterval(spawn);mole.style.display='none';document.getElementById('sceneDesc').textContent='游戏结束！你打了 '+score.v+' 只地鼠！🎉'},30000);
}

function buildStream(el){
el.innerHTML='<div style="position:relative;width:100%;height:100px;background:linear-gradient(180deg,#B8D8F0 60%,#90C0D8 100%);border-radius:60px;overflow:hidden;margin-top:10px" id="streamArea"><div style="position:absolute;bottom:10px;width:100%;text-align:center;font-size:20px;color:rgba(0,0,0,.1)">～ ～ ～ ～ ～</div><div class="stream-stone" id="streamStone" style="left:20px;top:35px"></div></div><div style="text-align:center;margin-top:8px;font-size:12px;color:#999">👆 拖动石头打水漂！向右划出去～</div><div id="rippleCount" style="text-align:center;font-size:16px;font-weight:700;color:var(--pri);margin-top:4px"></div>';
setTimeout(()=>{
const stone=document.getElementById('streamStone'),area=document.getElementById('streamArea');
let startX=0,dragging=false;
stone.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=true;e.preventDefault()});
stone.addEventListener('touchmove',e=>{if(!dragging)return;const dx=e.touches[0].clientX-startX;stone.style.left=Math.max(5,Math.min(area.offsetWidth-35,20+dx))+'px';e.preventDefault()});
stone.addEventListener('touchend',e=>{dragging=false;const finalX=parseInt(stone.style.left);if(finalX>area.offsetWidth*.6){const ripples=Math.floor(Math.random()*5)+3;document.getElementById('rippleCount').textContent='💦 '+ripples+' 个水漂！厉害！';for(let i=0;i<ripples;i++){const rp=document.createElement('div');rp.className='stream-ripple';rp.style.left=(finalX+i*30)+'px';rp.style.top='50px';rp.style.animationDelay=i*.3+'s';area.appendChild(rp);setTimeout(()=>rp.remove(),1500)}setTimeout(()=>stone.style.left='20px',800)}else{stone.style.left='20px';document.getElementById('rippleCount').textContent='再试一次，用力划出去！💪'}});
},300);
}

function buildPark(el){
const leaves=['🍂','🍃','🌿','🍁','🦋','🌸'];el.innerHTML='<div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;font-size:36px" id="parkItems">'+leaves.map(l=>'<span style="cursor:pointer;transition:all .3s" onclick="const t=this;t.style.transform=\'scale(1.5) rotate(20deg)\';setTimeout(()=>t.style.transform=\'\',500);spawnMiniConfetti(event)">'+l+'</span>').join('')+'</div><div style="text-align:center;margin-top:8px;font-size:12px;color:#999">👆 点点看，收集公园里的小惊喜</div>';
}

function buildGrandma(el){
el.innerHTML='<div style="text-align:center"><div style="font-size:48px;animation:bounce 1.5s infinite;display:inline-block">🥟</div><div style="font-size:48px;animation:bounce 1.5s .3s infinite;display:inline-block">🍲</div><div style="font-size:48px;animation:bounce 1.5s .6s infinite;display:inline-block">🍜</div></div><div style="text-align:center;margin-top:12px"><button class="btn btn-outline btn-sm" onclick="const msgs=[\'外婆说：多吃点，看你瘦的 🥰\',\'外婆往你口袋里塞了一把大白兔奶糖 🍬\',\'外婆的手很暖，摸了摸你的头 ✨\',\'外婆站在门口，一直目送你走远 👋\'];document.getElementById(\'grandmaMsg\').textContent=msgs[Math.floor(Math.random()*msgs.length)]">💬 跟外婆说说话</button><div id="grandmaMsg" style="margin-top:8px;font-size:15px;color:var(--bn);font-weight:600;min-height:24px"></div></div>';
}

// ===== STICKERS =====
function collectSticker(locKey){const s=document.querySelector('.sticker-slot[data-loc="'+locKey+'"]');if(s){s.classList.add('collected');const e={school:'🏫',shop:'🏪',playground:'🎠',park:'🌳',grandma:'🏠',arcade:'🕹️',stream:'🌊'};s.textContent=e[locKey]||'⭐';document.getElementById('stickerCount').textContent=visitedLocations.size;s.style.transform='scale(1.3)';setTimeout(()=>s.style.transform='',300)}
// update map labels
const w=document.getElementById('mapWrap');w.querySelectorAll('.map-label').forEach(l=>l.remove());drawMap()}
function checkAllCollected(){if(visitedLocations.size>=7){document.getElementById('totalMinutes').textContent=Math.floor((Date.now()-startTime)/60000)||1;document.getElementById('shareCard').classList.add('show');spawnConfetti()}}

// ===== EFFECTS =====
function spawnConfetti(){const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);const e=['🎉','🎊','⭐','✨','💫','🌸','🎈','🍭','🎀','💝'];for(let i=0;i<40;i++){const p=document.createElement('span');p.className='confetti-piece';p.textContent=e[Math.floor(Math.random()*e.length)];p.style.left=Math.random()*100+'%';p.style.top=-(Math.random()*40)+'px';p.style.fontSize=(16+Math.random()*24)+'px';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()*1.5+'s';c.appendChild(p)}setTimeout(()=>c.remove(),5000)}
function spawnMiniConfetti(e){const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);const ms=['✨','💫','⭐','🌟'];for(let i=0;i<8;i++){const p=document.createElement('span');p.className='confetti-piece';p.textContent=ms[i%ms.length];p.style.left=(e.clientX+Math.random()*40-20)+'px';p.style.top=(e.clientY+Math.random()*20-10)+'px';p.style.fontSize=(10+Math.random()*14)+'px';p.style.animationDuration=(1+Math.random()*1.5)+'s';c.appendChild(p)}setTimeout(()=>c.remove(),2000)}

// ===== SHARE =====
function shareResult(){if(navigator.share){navigator.share({title:'童年时光机 · 六一快乐',text:'我在"回到童年"里走遍了7个童年角落，你也来试试吧！🧒✨',url:window.location.href}).catch(()=>{})}else{navigator.clipboard.writeText(window.location.href).then(()=>alert('链接已复制！')).catch(()=>{})}}

// Init
window.addEventListener('DOMContentLoaded',init);
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{const m=document.getElementById('screen-map');if(m.classList.contains('active')){const w=document.getElementById('mapWrap');w.querySelectorAll('.map-label').forEach(l=>l.remove());drawMap()}},300)});
</script>
</body>
